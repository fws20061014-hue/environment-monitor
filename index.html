<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能安全帽后台控制台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="console-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Integrated Helmet Console</p>
          <h1>智能安全帽后台控制台</h1>
        </div>
        <div class="top-actions">
          <span class="live-state"><i></i>模拟数据运行中</span>
          <button id="toWorkersPage" type="button">查看全部工人</button>
        </div>
      </header>

      <section id="dashboardPage" class="page-view">
        <section class="weather-board" aria-label="天气类数据">
          <article>
            <span>天气</span>
            <strong id="weatherText">晴</strong>
            <small id="weatherTip">适合室外作业，注意补水</small>
          </article>
          <article>
            <span>室外气温</span>
            <strong id="weatherTemp">-- °C</strong>
            <small>天气数据</small>
          </article>
          <article>
            <span>空气湿度</span>
            <strong id="weatherHumidity">--%</strong>
            <small>天气数据</small>
          </article>
          <article>
            <span>风速</span>
            <strong id="weatherWind">-- m/s</strong>
            <small>天气数据</small>
          </article>
          <article>
            <span>更新时间</span>
            <strong id="weatherTime">--</strong>
            <small>本地模拟</small>
          </article>
        </section>

        <section class="priority-panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Priority Workers</p>
              <h2>状况较差工人监测窗口</h2>
            </div>
            <span id="priorityCount">0 人异常</span>
          </div>
          <div id="priorityWorkerGrid" class="worker-grid priority-grid" aria-label="状况较差工人"></div>
        </section>

        <section class="site-board" aria-label="工地环境数据">
          <article>
            <span>工地气温</span>
            <strong id="siteTemp">-- °C</strong>
            <small id="siteTempState">正常</small>
          </article>
          <article>
            <span>工地粉尘浓度</span>
            <strong id="siteDust">-- µg/m³</strong>
            <small id="siteDustState">正常</small>
          </article>
          <article>
            <span>摔倒警告</span>
            <strong id="fallSummary">0 起</strong>
            <small>自动进入上方窗口</small>
          </article>
        </section>
      </section>

      <section id="workersPage" class="page-view is-hidden">
        <div class="subbar">
          <button id="backDashboard" type="button">返回首页</button>
          <div>
            <p class="eyebrow">All Workers</p>
            <h2>全部工人状态</h2>
          </div>
          <span id="workerPageTime">更新时间：--</span>
        </div>

        <section id="allWorkerGrid" class="worker-grid all-worker-grid" aria-label="全部工人"></section>
      </section>
    </main>

    <dialog id="workerDialog" class="worker-dialog">
      <form method="dialog">
        <button class="dialog-close" value="close" aria-label="关闭">×</button>
      </form>
      <div id="workerDetail"></div>
    </dialog>

    <script src="config.js" charset="UTF-8"></script>
    <script src="app.js" charset="UTF-8"></script>
  </body>
</html>
