<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安全帽工人状态管理员</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Helmet Admin Console</p>
          <h1>安全帽工人状态管理员</h1>
        </div>
        <div class="live-state"><span></span>异常自动置顶</div>
      </header>

      <section class="stats" aria-label="工人状态统计">
        <article><span>全部工人</span><strong id="totalCount">20</strong></article>
        <article><span>异常工人</span><strong id="abnormalCount">0</strong></article>
        <article><span>摔倒警告</span><strong id="fallCount">0</strong></article>
        <article><span>更新时间</span><strong id="updateTime">--</strong></article>
      </section>

      <section class="toolbar">
        <div>
          <p class="eyebrow">Worker Windows</p>
          <h2>全部工人独立小窗</h2>
        </div>
        <span>体温 ≥ 37.5 °C 或粉尘 ≥ 120 µg/m³ 视为异常</span>
      </section>

      <section id="workerGrid" class="worker-grid" aria-label="全部工人状态"></section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
